<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بۆ تاقانەکەم 💗</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Noto Sans Arabic', Tahoma, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #2d1b24 0%, #120a0e 60%, #050204 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* گەردوون و ئەستێرە جوڵاوەکان */
        .galaxy-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .star, .space-heart {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            animation: floatSpace 12s infinite linear;
            opacity: 0;
        }

        @keyframes floatSpace {
            0% { transform: translateY(105vh) scale(0.3) rotate(0deg); opacity: 0; }
            20% { opacity: 0.7; }
            80% { opacity: 0.7; }
            100% { transform: translateY(-10vh) scale(1.2) rotate(360deg); opacity: 0; }
        }

        /* کارتەکە */
        .container {
            width: 90%;
            max-width: 400px;
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 25px;
            z-index: 10;
            background: rgba(255, 238, 242, 0.06);
            border-radius: 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 182, 193, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .instruction-text {
            font-size: 14px;
            color: #ffb6c1;
            font-weight: 500;
            min-height: 24px;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 10px rgba(255, 77, 109, 0.3);
        }

        .main-text {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.8;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s ease;
            padding: 10px;
            color: #ffffff;
            text-shadow: 0 2px 15px rgba(255, 255, 255, 0.2);
        }

        .typing-effect {
            text-align: justify;
            text-align-last: center;
            font-size: 15px !important;
            font-weight: 600 !important;
            line-height: 2.1;
            color: #ffe0e6;
            text-shadow: 0 0 10px rgba(255, 182, 193, 0.2);
        }

        /* بەشی دڵەکە */
        .heart-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .heart-wave {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #ff4d6d;
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        }

        @keyframes waveAnimate {
            0% { transform: scale(0.8); opacity: 0.9; border-color: #ff4d6d; }
            100% { transform: scale(2.2); opacity: 0; border-color: #ff85a2; }
        }

        .fingerprint-area {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid rgba(255, 204, 213, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 25px rgba(255, 77, 109, 0.2);
            z-index: 5;
            transition: all 0.5s ease;
        }

        .icon {
            font-size: 45px;
            z-index: 6;
            display: inline-block;
        }

        @keyframes hapticBeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.25); }
            30% { transform: scale(1.02); }
            45% { transform: scale(1.18); }
            70% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        /* 📈 هێڵی لێدانی دڵ کە بە بەردەوامی دەڕوات و دەجوڵێت (Infinite Rolling ECG) */
        .haptic-line-container {
            width: 100%;
            height: 60px;
            display: none;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            margin-top: 10px;
            position: relative;
        }

        .haptic-svg {
            width: 200%; /* بۆ ئەوەی ڕووبەری جوڵەکەی هەبێت */
            height: 100%;
            position: absolute;
            right: 0;
            animation: moveEcgLine 2s infinite linear;
        }

        /* ئەنیمەیشنی ڕۆیشتن و ڕاکردنی هێڵەکە بەبێ بەرز و نزمی جێگیر */
        @keyframes moveEcgLine {
            0% { transform: translateX(0%); }
            100% { transform: translateX(50%); }
        }

        .ecg-path {
            stroke: #ff4d6d;
            stroke-width: 3;
            fill: none;
            filter: drop-shadow(0 0 5px #ff4d6d);
        }

        .particle-heart {
            position: absolute;
            color: #ff758f;
            opacity: 0;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: translateY(-150px) scale(1.3); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="1000054516.mp4" type="video/mp4">
    </audio>

    <div class="galaxy-container" id="galaxy"></div>

    <div class="container" id="card-box">
        <div class="instruction-text" id="instruction">پەنجەت لێرە دابنێ و لای مەبە...💗</div>

        <div class="main-text" id="story-display">
            هەست بە لێدانی دڵم دەکەیت؟...
        </div>

        <div class="heart-wrapper" id="heart-wrap">
            <div class="heart-wave" id="wave1"></div>
            <div class="heart-wave" id="wave2"></div>
            <div class="fingerprint-area" id="hold-target">
                <div class="icon" id="main-icon">❤️</div>
            </div>
        </div>

        <!-- هێڵی لێدانی دڵ کە بە بەردەوامی دەڕوات (ڕاکردنی شەپۆلەکە) -->
        <div class="haptic-line-container" id="haptic-container">
            <svg class="haptic-svg" viewBox="0 0 800 60" preserveAspectRatio="none">
                <!-- درێژکردنەوەی نەخشی لێدانەکە بۆ ئەوەی لە جوڵەدا نەپچڕێت -->
                <path class="ecg-path" d="M 0 30 L 120 30 L 130 15 L 140 45 L 150 5 L 160 55 L 170 25 L 180 35 L 190 30 L 520 30 L 530 15 L 540 45 L 550 5 L 560 55 L 570 25 L 580 35 L 590 30 L 800 30" />
            </svg>
        </div>
    </div>

    <script>
        const instruction = document.getElementById('instruction');
        const storyDisplay = document.getElementById('story-display');
        const holdTarget = document.getElementById('hold-target');
        const mainIcon = document.getElementById('main-icon');
        const wave1 = document.getElementById('wave1');
        const wave2 = document.getElementById('wave2');
        const cardBox = document.getElementById('card-box');
        const heartWrap = document.getElementById('heart-wrap');
        const hapticContainer = document.getElementById('haptic-container');
        const galaxy = document.getElementById('galaxy');
        const bgMusic = document.getElementById('bg-music');

        function createGalaxy() {
            galaxy.innerHTML = "";
            for(let i=0; i<30; i++) {
                let element = document.createElement('div');
                let isHeart = Math.random() > 0.6;
                element.classList.add(isHeart ? 'space-heart' : 'star');
                if(isHeart) {
                    element.innerHTML = Math.random() > 0.5 ? '💗' : '✨';
                    element.style.background = "none";
                } else {
                    element.style.background = `rgba(255, ${Math.floor(Math.random()*55)+200}, ${Math.floor(Math.random()*55)+200}, ${Math.random()*0.7+0.3})`;
                }
                let size = Math.random() * (isHeart ? 14 : 4) + 2;
                element.style.width = size + 'px';
                element.style.height = size + 'px';
                element.style.left = Math.random() * 100 + 'vw';
                element.style.animationDelay = Math.random() * 8 + 's';
                element.style.animationDuration = (Math.random() * 5 + 7) + 's';
                galaxy.appendChild(element);
            }
        }
        createGalaxy();

        // دەقە ڕاستکراوەکە بەپێی داواکارییەکەت
        const storyStages = [
            "هەست بە لێدانی دڵم دەکەیت؟...",
            "ئەم دڵە تەنیا بۆ تۆ لێ دەدات...",
            "خۆشم دەوێیت...",
            "خۆشەویسترین کەسی ژیانم...\n\nئەو دڵەی ئێستا هەستت پێکرد، لە ساتی بینینی تۆوە ئیتر موڵکی من نییە! تۆ بوویت بەو خوێنەی بە دەمارەکانمدا دەگەڕێت و بوویت بە ڕووناکی بۆ تاریکاییەکانی ڕۆحم.\n\nگەر هەموو تەمەنم یەک چرکە بێت، دەمهەوێت ئەو چرکەیە لەناو قووڵایی چاوەکانی تۆدا بەسەر ببەم. زۆرم خۆشدەوێیت، هێندەی ئەو ترپانەی لە سنگم دا لێدەدات..."
        ];

        let currentStage = 0;
        let stageInterval = null;
        let particleInterval = null;
        let isHolding = false;

        function typeWriter(text, element, speed = 35) {
            element.innerHTML = "";
            element.classList.add("typing-effect");
            let i = 0;
            function type() {
                if (i < text.length) {
                    if (text.substr(i, 2) === "\n") {
                        element.innerHTML += "<br>";
                        i += 2;
                    } else {
                        element.innerHTML += text.charAt(i);
                        i++;
                    }
                    setTimeout(type, speed);
                }
            }
            type();
        }

        function progressStages() {
            if (currentStage < storyStages.length - 1) {
                currentStage++;
                storyDisplay.style.opacity = 0;
                
                setTimeout(() => {
                    if (currentStage === 3) {
                        instruction.innerText = "بۆ هەمیشە... ✨";
                        clearInterval(stageInterval);
                        
                        // شاردنەوەی دڵەکە
                        heartWrap.style.transform = "scale(0)";
                        setTimeout(() => { heartWrap.style.display = "none"; }, 500);

                        // پیشاندانی هێڵی لێدانی دڵ کە دەڕوات و ڕادەکات
                        hapticContainer.style.display = "flex";

                        document.body.style.background = "radial-gradient(circle at center, #421223 0%, #17050c 70%, #000000 100%)";
                        cardBox.style.background = "rgba(255, 255, 255, 0.08)";
                        cardBox.style.boxShadow = "0 30px 70px rgba(255, 77, 109, 0.15)";

                        storyDisplay.style.opacity = 1;
                        typeWriter(storyStages[currentStage], storyDisplay, 35);
                    } else {
                        storyDisplay.innerText = storyStages[currentStage];
                        storyDisplay.style.opacity = 1;
                        
                        if (currentStage === 1) {
                            instruction.innerText = "ئەم دڵە تەنیا بۆ تۆ لێ دەدات... 💕";
                            mainIcon.style.animation = "hapticBeat 0.6s infinite cubic-bezier(0.25, 0.8, 0.25, 1)";
                            wave1.style.animation = "waveAnimate 0.6s infinite linear";
                            wave2.style.animation = "waveAnimate 0.6s infinite linear 0.3s";
                        } else if (currentStage === 2) {
                            instruction.innerText = "خۆشم دەوێیت... 💖";
                            mainIcon.style.animation = "hapticBeat 0.4s infinite cubic-bezier(0.25, 0.8, 0.25, 1)";
                            wave1.style.animation = "waveAnimate 0.4s infinite linear";
                            wave2.style.animation = "waveAnimate 0.4s infinite linear 0.2s";
                        }
                    }
                }, 200);
            }
        }

        function spawnHeartParticle() {
            const heart = document.createElement('div');
            heart.classList.add('particle-heart');
            heart.innerHTML = Math.random() > 0.4 ? '💗' : '✨';
            heart.style.left = (holdTarget.parentNode.offsetLeft + 10 + Math.random() * 90) + 'px';
            heart.style.top = (holdTarget.parentNode.offsetTop + 10 + Math.random() * 90) + 'px';
            heart.style.fontSize = (Math.random() * 10 + 14) + 'px';
            heart.style.animation = 'floatUp 0.9s ease-out forwards';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 900);
        }

        function startHold(e) {
            e.preventDefault();
            if (isHolding) return;
            isHolding = true;

            bgMusic.play().catch(() => {});
            holdTarget.style.borderColor = "#ff4d6d";
            holdTarget.style.background = "rgba(255, 77, 109, 0.15)";
            
            mainIcon.style.animation = "hapticBeat 0.9s infinite cubic-bezier(0.25, 0.8, 0.25, 1)";
            wave1.style.animation = "waveAnimate 0.9s infinite linear";
            wave2.style.animation = "waveAnimate 0.9s infinite linear 0.45s";

            stageInterval = setInterval(progressStages, 1500);
            particleInterval = setInterval(spawnHeartParticle, 200);
        }

        function endHold() {
            if (!isHolding) return;
            isHolding = false;

            clearInterval(stageInterval);
            clearInterval(particleInterval);

            if (currentStage < 3) {
                currentStage = 0;
                storyDisplay.style.opacity = 0;
                storyDisplay.classList.remove("typing-effect");
                document.body.style.background = "radial-gradient(circle at center, #2d1b24 0%, #120a0e 60%, #050204 100%)";
                cardBox.style.background = "rgba(255, 238, 242, 0.06)";
                
                setTimeout(() => {
                    storyDisplay.innerText = storyStages[0];
                    storyDisplay.style.opacity = 1;
                }, 150);

                instruction.innerText = "پەنجەت لێرە دابنێ و لای مەبە...💗";
                mainIcon.style.animation = "none";
                wave1.style.animation = "none";
                wave2.style.animation = "none";
                holdTarget.style.borderColor = "rgba(255, 204, 213, 0.3)";
                holdTarget.style.background = "rgba(255, 255, 255, 0.05)";
            }
        }

        holdTarget.addEventListener('mousedown', startHold);
        holdTarget.addEventListener('mouseup', endHold);
        holdTarget.addEventListener('mouseleave', endHold);

        holdTarget.addEventListener('touchstart', startHold);
        holdTarget.addEventListener('touchend', endHold);
    </script>
</body>
</html>
