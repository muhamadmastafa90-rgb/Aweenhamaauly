<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بۆ تاقانەکەم 💗</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Noto Sans Arabic', Tahoma, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffeef2 0%, #ffffff 50%, #ffdde2 100%);
            color: #4a3b40;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            transition: background 1.5s ease;
        }

        /* باگراوەندی بریسقەدار و جوڵاو */
        .bg-sparkle {
            position: absolute;
            background: radial-gradient(circle, rgba(255,182,193,0.6) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: floatSparkle 8s infinite linear;
        }

        @keyframes floatSparkle {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 25px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 30px;
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.9);
            transition: transform 0.3s ease;
        }

        .instruction-text {
            font-size: 14px;
            color: #a38f96;
            font-weight: 500;
            min-height: 24px;
            letter-spacing: 0.5px;
        }

        .main-text {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.8;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s ease;
            padding: 10px;
            color: #333333;
        }

        .typing-effect {
            text-align: justify;
            text-align-last: center;
            font-size: 15px !important;
            font-weight: 600 !important;
            line-height: 2;
            color: #444444;
            animation: fadeInText 0.5s ease forwards;
        }

        @keyframes fadeInText {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* شوێنی دڵەکە و وەیڤەکان */
        .heart-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* وەیڤی لێدانی دڵ (ECG Wave Effect) */
        .heart-wave {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #ff4d6d;
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
        }

        @keyframes waveAnimate {
            0% { transform: scale(0.8); opacity: 0.8; border-color: #ff4d6d; }
            50% { opacity: 0.4; }
            100% { transform: scale(2); opacity: 0; border-color: #ff85a2; }
        }

        /* بازنەی دڵەکە */
        .fingerprint-area {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid #ffccd5;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            background: #ffffff;
            box-shadow: 0 8px 20px rgba(255, 182, 193, 0.3);
            z-index: 5;
            transition: background 0.3s, border-color 0.3s;
        }

        .icon {
            font-size: 45px;
            z-index: 6;
            transform: scale(1);
            display: inline-block;
        }

        /* لێدانی نەرم و تەختیل (Haptic Feel Smooth Beat) */
        @keyframes hapticBeat {
            0% { transform: scale(1); }
            12% { transform: scale(1.22); }
            25% { transform: scale(1.03); }
            38% { transform: scale(1.15); }
            55% { transform: scale(0.97); }
            100% { transform: scale(1); }
        }

        .particle-heart {
            position: absolute;
            color: #ff758f;
            opacity: 0;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
            30% { opacity: 0.9; }
            100% { transform: translateY(-200px) scale(1.4) rotate(20deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="1000054516.mp4" type="video/mp4">
    </audio>

    <div class="container" id="card-box">
        <div class="instruction-text" id="instruction">پەنجەت لێرە دابنێ و لای مەبە...💗</div>

        <div class="main-text" id="story-display">
            هەست بە لێدانی دڵم دەکەیت؟...
        </div>

        <div class="heart-container">
            <div class="heart-wave" id="wave1"></div>
            <div class="heart-wave" id="wave2"></div>
            <div class="fingerprint-area" id="hold-target">
                <div class="icon" id="main-icon">❤️</div>
            </div>
        </div>
    </div>

    <script>
        const instruction = document.getElementById('instruction');
        const storyDisplay = document.getElementById('story-display');
        const holdTarget = document.getElementById('hold-target');
        const mainIcon = document.getElementById('main-icon');
        const wave1 = document.getElementById('wave1');
        const wave2 = document.getElementById('wave2');
        const cardBox = document.getElementById('card-box');
        const bgMusic = document.getElementById('bg-music');

        // دروستکردنی ئەستێرە گەشاوەکان لە باگراوند
        for(let i=0; i<12; i++) {
            let sparkle = document.createElement('div');
            sparkle.classList.add('bg-sparkle');
            sparkle.style.width = Math.random() * 80 + 40 + 'px';
            sparkle.style.height = sparkle.style.width;
            sparkle.style.left = Math.random() * 100 + 'vw';
            sparkle.style.animationDelay = Math.random() * 6 + 's';
            document.body.appendChild(sparkle);
        }

        const storyStages = [
            "هەست بە لێدانی دڵم دەکەیت؟...",
            "ئەم دڵە تەنیا بۆ تۆ لێ دەدات...",
            "خۆشم دەوێیت...",
            "خۆشەویسترین کەسی ژیانم...\n\nئەو دڵەی ئێستا هەستت پێکرد، لە ساتی بینینی تۆوە ئیتر موڵکی من نییە! تۆ بوویت بەو خوێنەی بە دەمارەکانمدا دەگەڕێت و بوویت بە ڕووناکی بۆ تاریکاییەکانی ڕۆحم.\n\nگەر هەموو تەمەنم یەک چرکە بێت، دەمهەوێت ئەو چرکەیە لەناو قووڵایی چاوەکانی تۆدا بەسەر ببەم. زۆرم خۆشدەوێیت، هێندەی هەموو ئەو تیرانەی کە تا کۆتایی تەمەنم لە سنگمدا لێ دەدەن..."
        ];

        let currentStage = 0;
        let stageInterval = null;
        let particleInterval = null;
        let isHolding = false;

        function typeWriter(text, element, speed = 30) {
            element.innerHTML = "";
            element.classList.add("typing-effect");
            let i = 0;
            function type() {
                if (i < text.length) {
                    if (text.substr(i, 2) === "\n") {
                        element.innerHTML += "<br>";
                        i += 2;
                    } else {
                        element.innerHTML += text.charAt(i);
                        i++;
                    }
                    setTimeout(type, speed);
                }
            }
            type();
        }

        function progressStages() {
            if (currentStage < storyStages.length - 1) {
                currentStage++;
                storyDisplay.style.opacity = 0;
                
                setTimeout(() => {
                    if (currentStage === 3) {
                        instruction.innerText = "بۆ هەمیشە... ✨";
                        
                        // وەیڤی خێرا و لێدانی زۆر قورس لە کۆتاییدا
                        mainIcon.style.animation = "hapticBeat 0.4s infinite cubic-bezier(0.25, 0.8, 0.25, 1)";
                        wave1.style.animation = "waveAnimate 0.4s infinite linear";
                        wave2.style.animation = "waveAnimate 0.4s infinite linear 0.2s";
                        
                        // سوپڕایز: گۆڕینی ڕەنگی پاشبنەما بۆ پینکی تەواو
                        document.body.style.background = "linear-gradient(135deg, #ffccd5 0%, #ffe5ec 100%)";
                        cardBox.style.transform = "scale(1.03)";

                        clearInterval(stageInterval);
                        storyDisplay.style.opacity = 1;
                        typeWriter(storyStages[currentStage], storyDisplay, 30);
                    } else {
                        storyDisplay.innerText = storyStages[currentStage];
                        storyDisplay.style.opacity = 1;
                        
                        // خێراکردنی وەیڤەکان و لێدانەکە بەپێی قۆناغەکان (تەختیل)
                        if (currentStage === 1) {
                            instruction.innerText = "ئەم دڵە تەنیا بۆ تۆ لێ دەدات... 💕";
                            mainIcon.style.animation = "hapticBeat 0.7s infinite cubic-bezier(0.25, 0.8, 0.25, 1)";
                            wave1.style.animation = "waveAnimate 0.7s infinite linear";
                            wave2.style.animation = "waveAnimate 0.7s infinite linear 0.35s";
                        } else if (currentStage === 2) {
                            instruction.innerText = "خۆشم دەوێیت... 💖";
                            mainIcon.style.animation = "hapticBeat 0.5s infinite cubic-bezier(0.25, 0.8, 0.25, 1)";
                            wave1.style.animation = "waveAnimate 0.5s infinite linear";
                            wave2.style.animation = "waveAnimate 0.5s infinite linear 0.25s";
                        }
                    }
                }, 200);
            }
        }

        function spawnHeartParticle() {
            const heart = document.createElement('div');
            heart.classList.add('particle-heart');
            heart.innerHTML = Math.random() > 0.4 ? '💗' : '✨';
            heart.style.left = (holdTarget.parentNode.offsetLeft + 20 + Math.random() * 80) + 'px';
            heart.style.top = (holdTarget.parentNode.offsetTop + 20 + Math.random() * 80) + 'px';
            heart.style.fontSize = (Math.random() * 12 + 14) + 'px';
            heart.style.animation = 'floatUp 1s ease-out forwards';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }

        function startHold(e) {
            e.preventDefault();
            if (isHolding) return;
            isHolding = true;

            bgMusic.play().catch(() => {});
            holdTarget.style.borderColor = "#ff4d6d";
            holdTarget.style.background = "#fff0f3";
            
            // قۆناغی یەکەم لێدانی تەختیل و وەیڤ چالاک دەبێت
            mainIcon.style.animation = "hapticBeat 1s infinite cubic-bezier(0.25, 0.8, 0.25, 1)";
            wave1.style.animation = "waveAnimate 1s infinite linear";
            wave2.style.animation = "waveAnimate 1s infinite linear 0.5s";

            // کاتەکە کەمکراوەتەوە بۆ لێدانی زۆر خێرا (تەنها 1500 میلی چرکە بۆ هەر دەقێک)
            stageInterval = setInterval(progressStages, 1500);
            particleInterval = setInterval(spawnHeartParticle, 250);
        }

        function endHold() {
            if (!isHolding) return;
            isHolding = false;

            clearInterval(stageInterval);
            clearInterval(particleInterval);

            // ئەگەر پێش گەیشتن بە کۆتایی دەستی لابدات، هەموو شتێک ڕیست دەبێتەوە
            if (currentStage < 3) {
                currentStage = 0;
                storyDisplay.style.opacity = 0;
                storyDisplay.classList.remove("typing-effect");
                document.body.style.background = "linear-gradient(135deg, #ffeef2 0%, #ffffff 50%, #ffdde2 100%)";
                cardBox.style.transform = "scale(1)";
                
                setTimeout(() => {
                    storyDisplay.innerText = storyStages[0];
                    storyDisplay.style.opacity = 1;
                }, 150);

                instruction.innerText = "پەنجەت لێرە دابنێ و لای مەبە...💗";
                mainIcon.style.animation = "none";
                wave1.style.animation = "none";
                wave2.style.animation = "none";
                holdTarget.style.borderColor = "#ffccd5";
                holdTarget.style.background = "#ffffff";
            }
        }

        holdTarget.addEventListener('mousedown', startHold);
        holdTarget.addEventListener('mouseup', endHold);
        holdTarget.addEventListener('mouseleave', endHold);

        holdTarget.addEventListener('touchstart', startHold);
        holdTarget.addEventListener('touchend', endHold);
    </script>
</body>
</html>
