<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بۆ تاقانەکەم 💗</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;700;800&display=swap');

    :root {
      --bg-1: #14080d;
      --bg-2: #24111a;
      --bg-3: #050204;
      --card: rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.1);
      --text-main: #fff7fa;
      --text-soft: #ffd7df;
      --text-muted: #f1a8b9;
      --primary: #ff4d88;
      --primary-2: #ff7aa5;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      --blur: 20px;
      --radius-xl: 32px;
      --radius-lg: 22px;
      --transition: 0.45s cubic-bezier(.2,.8,.2,1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Noto Sans Arabic', Tahoma, sans-serif;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      width: 100%;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: var(--text-main);
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 90, 140, 0.15), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(255, 180, 210, 0.08), transparent 25%),
        radial-gradient(circle at center, var(--bg-2) 0%, var(--bg-1) 55%, var(--bg-3) 100%);
      position: relative;
      padding: 20px;
    }

    .ambient-blur,
    .ambient-blur::before,
    .ambient-blur::after {
      position: absolute;
      inset: auto;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
    }

    .ambient-blur {
      width: 220px;
      height: 220px;
      top: 5%;
      left: 8%;
      background: rgba(255, 77, 136, 0.14);
      animation: drift 10s ease-in-out infinite alternate;
    }

    .ambient-blur::before {
      content: "";
      width: 260px;
      height: 260px;
      right: -65vw;
      top: 18vh;
      background: rgba(255, 173, 198, 0.12);
      animation: drift 13s ease-in-out infinite alternate-reverse;
    }

    .ambient-blur::after {
      content: "";
      width: 180px;
      height: 180px;
      right: -25vw;
      top: 52vh;
      background: rgba(255, 77, 136, 0.08);
      animation: drift 12s ease-in-out infinite alternate;
    }

    @keyframes drift {
      from { transform: translateY(0) translateX(0) scale(1); }
      to   { transform: translateY(18px) translateX(10px) scale(1.08); }
    }

    .galaxy-container {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }

    .star, .space-heart {
      position: absolute;
      opacity: 0;
      animation: floatSpace linear infinite;
      will-change: transform, opacity;
    }

    .star {
      border-radius: 50%;
      background: rgba(255,255,255,.9);
      box-shadow: 0 0 10px rgba(255,255,255,.45);
    }

    .space-heart {
      display: grid;
      place-items: center;
      background: transparent;
      text-shadow: 0 0 14px rgba(255, 110, 160, 0.45);
    }

    @keyframes floatSpace {
      0% {
        transform: translateY(110vh) scale(.45) rotate(0deg);
        opacity: 0;
      }
      15% { opacity: .75; }
      85% { opacity: .75; }
      100% {
        transform: translateY(-15vh) scale(1.08) rotate(360deg);
        opacity: 0;
      }
    }

    .container {
      width: min(100%, 430px);
      min-height: 640px;
      position: relative;
      z-index: 3;
      padding: 26px 22px;
      border-radius: var(--radius-xl);
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.10) 0%,
        rgba(255,255,255,0.05) 100%
      );
      border: 1px solid var(--card-border);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      transition: var(--transition);
      isolation: isolate;
    }

    .container::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,.25),
        rgba(255,255,255,.04),
        rgba(255, 114, 161, .14)
      );
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      z-index: 2;
    }

    .card-bg-image {
      position: absolute;
      inset: 0;
      background-image: url('1000054531.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.8s ease;
      z-index: -2;
      transform: scale(1.02);
      filter: brightness(0.35) saturate(1.05);
    }

    .card-bg-overlay {
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(to bottom, rgba(8, 4, 6, 0.18), rgba(8, 4, 6, 0.78)),
        radial-gradient(circle at top, rgba(255, 94, 146, 0.14), transparent 45%);
      opacity: 0.9;
    }

    .top-badge {
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .2px;
      box-shadow: inset 0 0 15px rgba(255,255,255,.02);
    }

    .title {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.5;
      color: #fff;
      text-align: center;
      text-shadow: 0 6px 30px rgba(255, 77, 136, 0.12);
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.9;
      max-width: 310px;
    }

    .instruction-text {
      min-height: 26px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-soft);
      text-align: center;
      text-shadow: 0 4px 18px rgba(255, 77, 136, 0.25);
      transition: var(--transition);
    }

    .main-text {
      width: 100%;
      min-height: 188px;
      padding: 22px 18px;
      border-radius: 24px;
      background: rgba(255,255,255,0.045);
      border: 1px solid rgba(255,255,255,0.07);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 10px 30px rgba(0,0,0,0.18);
      color: var(--text-main);
      font-size: 19px;
      font-weight: 700;
      line-height: 2;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      overflow: hidden;
      white-space: pre-line;
    }

    .main-text.final-mode {
      background: rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-color: rgba(255,255,255,0.08);
      color: #fff3f7;
      font-size: 15px;
      font-weight: 600;
      line-height: 2.15;
      text-align: justify;
      text-align-last: center;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        0 16px 36px rgba(0,0,0,0.28);
    }

    .heart-wrapper {
      position: relative;
      width: 140px;
      height: 140px;
      display: grid;
      place-items: center;
      transition: .5s ease;
    }

    .pulse-ring,
    .pulse-ring::before,
    .pulse-ring::after {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(255, 125, 168, 0.22);
    }

    .pulse-ring::before,
    .pulse-ring::after {
      content: "";
      inset: -10px;
      animation: pulseRing 2.3s linear infinite;
    }

    .pulse-ring::after {
      inset: -20px;
      animation-delay: .8s;
    }

    @keyframes pulseRing {
      0%   { transform: scale(.88); opacity: 0; }
      25%  { opacity: .45; }
      100% { transform: scale(1.12); opacity: 0; }
    }

    .fingerprint-area {
      width: 104px;
      height: 104px;
      border: 1.5px solid rgba(255, 214, 225, 0.34);
      border-radius: 50%;
      display: grid;
      place-items: center;
      cursor: pointer;
      position: relative;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12), transparent 35%),
        rgba(255,255,255,0.05);
      box-shadow:
        inset 0 0 18px rgba(255,255,255,0.05),
        0 10px 30px rgba(255, 77, 136, 0.16);
      transition: var(--transition);
    }

    .fingerprint-area::before {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,.08);
    }

    .fingerprint-area.active {
      transform: scale(1.04);
      border-color: rgba(255, 110, 160, 0.88);
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.18), transparent 35%),
        rgba(255, 77, 136, 0.12);
      box-shadow:
        inset 0 0 20px rgba(255,255,255,0.07),
        0 16px 40px rgba(255, 77, 136, 0.28);
    }

    .icon {
      font-size: 44px;
      filter: drop-shadow(0 0 14px rgba(255, 77, 136, 0.35));
      transition: var(--transition);
    }

    .fingerprint-area.active .icon {
      transform: scale(1.08);
    }

    .hint {
      font-size: 12px;
      color: rgba(255, 226, 233, 0.72);
      margin-top: -4px;
      text-align: center;
    }

    .progress-line {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.05);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ff5f95, #ff8fb5, #ffd1dd);
      box-shadow: 0 0 15px rgba(255, 96, 147, 0.4);
      transition: width .16s linear;
    }

    .haptic-line-container {
      width: 100%;
      height: 88px;
      display: none;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 18px;
      background: rgba(8, 2, 4, 0.58);
      border: 1px solid rgba(255, 77, 136, 0.18);
      box-shadow: inset 0 0 18px rgba(255, 77, 136, 0.04);
    }

    .ecg-svg-base {
      width: 100%;
      height: 100%;
    }

    .ecg-static-path {
      stroke: rgba(255, 77, 136, 0.12);
      stroke-width: 2;
      fill: none;
    }

    .ecg-dynamic-path {
      stroke: #ff5a8f;
      stroke-width: 3;
      fill: none;
      stroke-dasharray: 1200;
      stroke-dashoffset: 1200;
      animation: hospitalScan 2.4s linear infinite;
      filter: drop-shadow(0 0 8px rgba(255, 90, 143, 0.75));
    }

    @keyframes hospitalScan {
      from { stroke-dashoffset: 1200; }
      to   { stroke-dashoffset: 0; }
    }

    .particle-heart {
      position: absolute;
      color: #ff8fb5;
      opacity: 0;
      pointer-events: none;
      z-index: 20;
      animation: floatUp .95s ease-out forwards;
      text-shadow: 0 0 12px rgba(255, 77, 136, 0.35);
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(.55);
        opacity: 0;
      }
      25% { opacity: 1; }
      100% {
        transform: translateY(-150px) scale(1.24);
        opacity: 0;
      }
    }

    .footer-note {
      font-size: 12px;
      color: rgba(255, 223, 231, 0.68);
      text-align: center;
      line-height: 1.8;
    }

    .hide {
      opacity: 0 !important;
      transform: scale(.8);
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .container {
        min-height: 610px;
        padding: 22px 16px;
      }

      .title {
        font-size: 23px;
      }

      .main-text {
        font-size: 18px;
        min-height: 175px;
      }

      .main-text.final-mode {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="ambient-blur"></div>
  <div class="galaxy-container" id="galaxy"></div>

  <audio id="bg-music" loop>
    <source src="1000054611.mp4" type="video/mp4" />
  </audio>

  <main class="container" id="card-box">
    <div class="card-bg-image" id="bg-img"></div>
    <div class="card-bg-overlay"></div>

    <div class="top-badge">بۆ ئەو دڵەی کە هەموو شتێکی منە 💗</div>

    <div>
      <h1 class="title">بۆ تاقانەکەم</h1>
      <p class="subtitle">تەنها چەند چرکەیەک پەنجەت لەسەر دڵەکە بهێڵە… بزانە چی لە دڵمدا هەیە.</p>
    </div>

    <div class="instruction-text" id="instruction">پەنجەت لێرە دابنێ و لای مەبە... 💞</div>

    <section class="main-text" id="story-display">
      هەست بە لێدانی دڵم دەکەیت؟...
    </section>

    <div class="progress-line" aria-hidden="true">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <div class="heart-wrapper" id="heart-wrap">
      <div class="pulse-ring"></div>

      <button class="fingerprint-area" id="hold-target" aria-label="دەست لێ بدە">
        <div class="icon" id="main-icon">❤️</div>
      </button>
    </div>

    <div class="hint">لەم دڵە نزیک ببەوە، چیرۆکەکە خۆی دەردەکەوێت</div>

    <div class="haptic-line-container" id="haptic-container">
      <svg class="ecg-svg-base" viewBox="0 0 400 88" preserveAspectRatio="none">
        <path id="static-p" class="ecg-static-path" d=""></path>
        <path id="dynamic-p" class="ecg-dynamic-path" d=""></path>
      </svg>
    </div>

    <div class="footer-note">هەموو لێدانێکی دڵم، ناوی تۆی لەگەڵدایە ✨</div>
  </main>

  <script>
    const instruction = document.getElementById('instruction');
    const storyDisplay = document.getElementById('story-display');
    const holdTarget = document.getElementById('hold-target');
    const cardBox = document.getElementById('card-box');
    const heartWrap = document.getElementById('heart-wrap');
    const hapticContainer = document.getElementById('haptic-container');
    const bgImg = document.getElementById('bg-img');
    const galaxy = document.getElementById('galaxy');
    const bgMusic = document.getElementById('bg-music');
    const staticPath = document.getElementById('static-p');
    const dynamicPath = document.getElementById('dynamic-p');
    const progressFill = document.getElementById('progress-fill');

    const stages = [
      "هەست بە لێدانی دڵم دەکەیت؟...",
      "ئەم دڵە تەنها بۆ تۆ لێ دەدات...",
      "خۆشم دەوێیت...",
      "خۆشەویسترین کەسی ژیانم...\n\nئەو دڵەی ئێستا هەستت پێکرد، لە یەکەم ساتی بینینی تۆوە ئیتر موڵکی من نەما. تۆ بوویت بەو هەناسەیەی ژیانم پێ دەبەخشێت، و بەو ڕووناکییەی تاریکیی ناو ڕۆحم دەشکێنێت.\n\nئەگەر تەمەنی من تەنها یەک چرکە بێت، دەمەوێت ئەو چرکەیە هەمووی لەگەڵ تۆ بەسەر بەرەم. زۆر خۆشدەوێیت... هێندەی هەموو ئەو لێدانانەی کە لە دڵمدا بۆ تۆ هەن."
    ];

    const instructionStages = [
      "پەنجەت لێرە دابنێ و لای مەبە... 💞",
      "ئەم دڵە تەنها بۆ تۆ لێ دەدات... 💗",
      "وشەکان نزیکن لە دەربڕین... ✨",
      "بۆ هەمیشە... ♾️"
    ];

    let isHolding = false;
    let currentStage = 0;
    let holdStartTime = 0;
    let rafId = null;
    let stageTimers = [];
    let particleInterval = null;
    let typingTimeout = null;
    let finalRevealed = false;

    function generateRandomEcgPath() {
      const centerY = 44;
      let path = `M 0 ${centerY} L 28 ${centerY} `;
      const segments = [84, 190, 300];

      segments.forEach((startX) => {
        const p1 = startX;
        const p2 = startX + 12;
        const p3 = startX + 22;
        const p4 = startX + 32;
        const p5 = startX + 45;

        const up = Math.floor(Math.random() * 22) + 8;
        const down = Math.floor(Math.random() * 22) + 56;

        path += `L ${p1} ${centerY} L ${p2} ${up} L ${p3} ${down} L ${p4} ${centerY - 4} L ${p5} ${centerY} `;
      });

      path += `L 400 ${centerY}`;
      staticPath.setAttribute('d', path);
      dynamicPath.setAttribute('d', path);
    }

    dynamicPath.addEventListener('animationiteration', generateRandomEcgPath);

    function createGalaxy() {
      galaxy.innerHTML = "";

      for (let i = 0; i < 34; i++) {
        const element = document.createElement('div');
        const isHeart = Math.random() > 0.65;

        element.classList.add(isHeart ? 'space-heart' : 'star');

        if (isHeart) {
          element.textContent = Math.random() > 0.5 ? '💗' : '✨';
          element.style.fontSize = (Math.random() * 12 + 10) + 'px';
        } else {
          const size = Math.random() * 3 + 1.5;
          element.style.width = size + 'px';
          element.style.height = size + 'px';
          element.style.background = `rgba(255, ${Math.floor(Math.random()*55)+200}, ${Math.floor(Math.random()*55)+200}, ${Math.random()*0.55+0.25})`;
        }

        element.style.left = Math.random() * 100 + 'vw';
        element.style.top = Math.random() * 100 + 'vh';
        element.style.animationDuration = (Math.random() * 6 + 8) + 's';
        element.style.animationDelay = (Math.random() * 8) + 's';
        galaxy.appendChild(element);
      }
    }

    createGalaxy();

    function setStage(index) {
      currentStage = index;
      instruction.textContent = instructionStages[index];

      if (index < 3) {
        storyDisplay.classList.remove('final-mode');
        storyDisplay.style.opacity = 0;

        setTimeout(() => {
          storyDisplay.textContent = stages[index];
          storyDisplay.style.opacity = 1;
        }, 180);
      } else {
        revealFinalStage();
      }
    }

    function typeWriter(text, element, speed = 30) {
      clearTimeout(typingTimeout);
      element.textContent = "";
      let i = 0;

      function type() {
        if (i < text.length) {
          element.textContent += text.charAt(i);
          i++;
          typingTimeout = setTimeout(type, speed);
        }
      }

      type();
    }

    function revealFinalStage() {
      if (finalRevealed) return;
      finalRevealed = true;

      bgImg.style.opacity = "1";
      storyDisplay.classList.add('final-mode');
      heartWrap.classList.add('hide');

      setTimeout(() => {
        heartWrap.style.display = 'none';
      }, 420);

      generateRandomEcgPath();
      hapticContainer.style.display = 'flex';

      cardBox.style.background = "linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.18))";
      cardBox.style.boxShadow = "0 28px 70px rgba(255, 77, 136, 0.18), 0 20px 50px rgba(0,0,0,0.35)";

      storyDisplay.style.opacity = 0;
      setTimeout(() => {
        storyDisplay.textContent = "";
        storyDisplay.style.opacity = 1;
        typeWriter(stages[3], storyDisplay, 28);
      }, 250);
    }

    function spawnHeartParticle() {
      const rect = holdTarget.getBoundingClientRect();
      const particle = document.createElement('div');
      particle.className = 'particle-heart';
      particle.textContent = Math.random() > 0.35 ? '💗' : '✨';

      particle.style.left = (rect.left + window.scrollX + rect.width / 2 + (Math.random() * 36 - 18)) + 'px';
      particle.style.top = (rect.top + window.scrollY + rect.height / 2 + (Math.random() * 20 - 10)) + 'px';
      particle.style.fontSize = (Math.random() * 10 + 14) + 'px';

      document.body.appendChild(particle);
      setTimeout(() => particle.remove(), 1000);
    }

    function clearAllTimers() {
      stageTimers.forEach(timer => clearTimeout(timer));
      stageTimers = [];
      clearInterval(particleInterval);
      cancelAnimationFrame(rafId);
      clearTimeout(typingTimeout);
    }

    function resetCard() {
      clearAllTimers();

      if (finalRevealed) return;

      isHolding = false;
      currentStage = 0;
      progressFill.style.width = '0%';
      holdTarget.classList.remove('active');

      storyDisplay.classList.remove('final-mode');
      storyDisplay.style.opacity = 0;

      setTimeout(() => {
        storyDisplay.textContent = stages[0];
        storyDisplay.style.opacity = 1;
      }, 150);

      instruction.textContent = instructionStages[0];
    }

    function updateProgress() {
      if (!isHolding || finalRevealed) return;

      const elapsed = performance.now() - holdStartTime;
      const total = 5200;
      const percent = Math.min((elapsed / total) * 100, 100);
      progressFill.style.width = percent + '%';

      rafId = requestAnimationFrame(updateProgress);
    }

    function startHold(e) {
      e.preventDefault();
      if (isHolding || finalRevealed) return;

      isHolding = true;
      holdStartTime = performance.now();
      holdTarget.classList.add('active');

      bgMusic.play().catch(() => {});

      stageTimers.push(setTimeout(() => setStage(1), 1100));
      stageTimers.push(setTimeout(() => setStage(2), 2500));
      stageTimers.push(setTimeout(() => setStage(3), 4300));

      particleInterval = setInterval(spawnHeartParticle, 180);
      updateProgress();
    }

    function endHold() {
      if (!isHolding || finalRevealed) return;
      resetCard();
    }

    holdTarget.addEventListener('pointerdown', startHold);
    window.addEventListener('pointerup', endHold);
    holdTarget.addEventListener('pointerleave', endHold);
    holdTarget.addEventListener('pointercancel', endHold);
  </script>
</body>
</html>
